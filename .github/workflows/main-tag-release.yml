name: Create Tag On Main Update

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Require Sparkle secrets
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [ -z "${SPARKLE_PUBLIC_ED_KEY}" ]; then
            echo "Missing SPARKLE_PUBLIC_ED_KEY secret."
            exit 1
          fi
          if [ -z "${SPARKLE_PRIVATE_ED_KEY}" ]; then
            echo "Missing SPARKLE_PRIVATE_ED_KEY secret."
            exit 1
          fi
          echo "Sparkle secrets are configured."

  create-tag:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag name
        id: tag
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION}.${GITHUB_RUN_NUMBER}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

  release:
    needs:
      - preflight
      - create-tag
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.create-tag.outputs.tag }}
    secrets: inherit
