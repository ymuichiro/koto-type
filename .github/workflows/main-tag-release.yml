name: Create Tag On Main Update

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      release_enabled: ${{ steps.check.outputs.release_enabled }}
    steps:
      - name: Check Sparkle secrets
        id: check
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [ -n "${SPARKLE_PUBLIC_ED_KEY}" ] && [ -n "${SPARKLE_PRIVATE_ED_KEY}" ]; then
            echo "release_enabled=true" >> "${GITHUB_OUTPUT}"
            echo "Sparkle secrets are configured."
          else
            echo "release_enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Sparkle secrets are not configured. Skipping automatic tag and release."
          fi

  create-tag:
    needs: preflight
    if: needs.preflight.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag name
        id: tag
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION}.${GITHUB_RUN_NUMBER}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

  release:
    needs:
      - preflight
      - create-tag
    if: needs.preflight.outputs.release_enabled == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.create-tag.outputs.tag }}
    secrets: inherit

  release-skipped:
    needs: preflight
    if: needs.preflight.outputs.release_enabled != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped release
        run: echo "Skipping release because Sparkle secrets are not configured."
